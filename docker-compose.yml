services:
  febnik:
    build: .
    container_name: febnik
    restart: unless-stopped
    stop_grace_period: 30s
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - .env
    environment:
      # Персистентная БД в именованном volume
      DATABASE_URL: sqlite+aiosqlite:////data/febnik.db
      CABINET_BANNERS_DIR: /data/cabinet_banners
      WEB_HOST: "0.0.0.0"
      WEB_PORT: "8080"
    ports:
      # Снаружи:внутри (внутри контейнера приложение слушает 8080)
      - "${WEB_PUBLISH_PORT:-8001}:8080"
    volumes:
      - febnik_data:/data
      # Шаблоны и /static с хоста — иначе после правок нужен `docker compose build` каждый раз
      - ./febnik:/app/febnik:ro
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 20s

volumes:
  febnik_data:
