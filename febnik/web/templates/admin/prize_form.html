{% extends "base.html" %}
{% block title %}{{ title }} — админка{% endblock %}
{% block content %}
<div class="card" style="max-width: 480px;">
  <div class="toolbar">
    <h1 style="margin:0; flex:1;">{{ title }}</h1>
    <a href="/admin/prizes" class="btn btn-secondary btn-sm">К списку</a>
  </div>
  <form method="post" action="{% if prize %}/admin/prizes/{{ prize.id }}/edit{% else %}/admin/prizes/new{% endif %}">
    <label>Название <input type="text" name="name" required value="{{ prize.name if prize else '' }}"></label>
    <label>Цена, ФЭБ <input type="number" name="cost_feb" min="0" required value="{{ prize.cost_feb if prize else 0 }}"></label>
    <label>Остаток на стойке <input type="number" name="stock" min="0" value="{{ prize.stock if prize else 0 }}"></label>
    <p class="row-actions" style="margin-top:1rem;"><button type="submit" class="btn">Сохранить</button> <a href="/admin/prizes" class="btn btn-secondary">Отмена</a></p>
  </form>
</div>
{% endblock %}
