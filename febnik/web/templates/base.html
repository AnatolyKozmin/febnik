<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}ФЭБник{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Figma «цвета» 8083:69 — бордо #69090B, графит #282828, сланец #607190 */
      --bg: #f8f5f2;
      --bg-accent: linear-gradient(145deg, #fef0db 0%, #f8f5f2 48%, #ffdfde 100%);
      --surface: #ffffff;
      --text: #282828;
      --muted: #5c6478;
      --accent: #69090b;
      --accent-hover: #560708;
      --accent-soft: rgba(105, 9, 11, 0.1);
      --danger: #b42318;
      --danger-hover: #c92f23;
      --secondary: #4a5d54;
      --border: rgba(40, 40, 40, 0.1);
      --shadow: 0 4px 24px rgba(40, 40, 40, 0.07);
      --shadow-sm: 0 2px 12px rgba(40, 40, 40, 0.06);
      --radius: 14px;
      --radius-sm: 10px;
      --font: "Plus Jakarta Sans", system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font);
      font-size: 15px;
      line-height: 1.55;
      color: var(--text);
      background: var(--bg-accent);
      background-attachment: fixed;
    }
    a { color: var(--accent); text-decoration: none; font-weight: 500; transition: color 0.15s ease; }
    a:hover { color: var(--accent-hover); }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.75rem 1rem;
      padding: 0.85rem 1.5rem;
      padding-left: max(1.5rem, env(safe-area-inset-left, 0px));
      padding-right: max(1.5rem, env(safe-area-inset-right, 0px));
      padding-top: max(0.85rem, env(safe-area-inset-top, 0px));
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.6) inset;
    }
    .brand {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .brand a { color: inherit; }
    .brand a:hover { color: var(--accent); }
    .site-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
    }
    .site-nav a {
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--muted);
      background: transparent;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .site-nav a:hover {
      color: var(--accent);
      background: var(--accent-soft);
    }

    .main-content {
      max-width: 1040px;
      margin: 0 auto;
      padding: 1.75rem 1.25rem 3rem;
      padding-left: max(1.25rem, env(safe-area-inset-left, 0px));
      padding-right: max(1.25rem, env(safe-area-inset-right, 0px));
      padding-bottom: max(3rem, env(safe-area-inset-bottom, 0px));
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.35rem 1.5rem;
      margin-bottom: 1.25rem;
      box-shadow: var(--shadow-sm);
    }
    .card h1 {
      font-size: 1.45rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin: 0 0 0.5rem 0;
      color: var(--text);
    }
    .card h2 {
      font-size: 1.05rem;
      font-weight: 600;
      margin: 0 0 0.75rem 0;
      color: var(--text);
    }

    .flash {
      padding: 0.75rem 1rem;
      margin-bottom: 1.25rem;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, #e8f5ec 0%, #dff0e4 100%);
      border: 1px solid rgba(105, 9, 11, 0.22);
      color: #0d3d24;
      font-weight: 500;
      box-shadow: var(--shadow-sm);
    }

    .muted { color: var(--muted); font-size: 0.92rem; }
    code {
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 0.88em;
      padding: 0.12rem 0.4rem;
      border-radius: 6px;
      background: rgba(105, 9, 11, 0.09);
      color: var(--text);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 8px rgba(105, 9, 11, 0.25);
      transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.15s ease;
    }
    .btn:hover {
      background: var(--accent-hover);
      box-shadow: 0 4px 14px rgba(105, 9, 11, 0.3);
      transform: translateY(-1px);
      color: #fff;
    }
    .btn:active { transform: translateY(0); }
    .btn-secondary {
      background: var(--secondary);
      box-shadow: 0 2px 8px rgba(74, 93, 84, 0.2);
    }
    .btn-secondary:hover {
      background: #3d4f47;
      box-shadow: 0 4px 12px rgba(74, 93, 84, 0.25);
      color: #fff;
    }
    .btn-danger {
      background: var(--danger);
      box-shadow: 0 2px 8px rgba(180, 35, 24, 0.25);
    }
    .btn-danger:hover {
      background: var(--danger-hover);
      color: #fff;
    }
    .btn-sm { padding: 0.35rem 0.65rem; font-size: 0.82rem; }

    .toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: center; margin-bottom: 1rem; }

    .table-wrap {
      overflow-x: auto;
      margin: 0 -0.25rem;
      padding: 0 0.25rem;
      border-radius: var(--radius-sm);
      -webkit-overflow-scrolling: touch;
      scrollbar-gutter: stable;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 0.92rem;
    }
    thead th {
      text-align: left;
      padding: 0.65rem 0.75rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      background: rgba(105, 9, 11, 0.06);
      border-bottom: 1px solid var(--border);
    }
    thead th:first-child { border-radius: var(--radius-sm) 0 0 0; }
    thead th:last-child { border-radius: 0 var(--radius-sm) 0 0; }
    tbody td {
      padding: 0.65rem 0.75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(105, 9, 11, 0.03); }

    label {
      display: block;
      margin-top: 0.85rem;
      font-size: 0.88rem;
      font-weight: 500;
      color: var(--muted);
    }
    input, select, textarea {
      width: 100%;
      max-width: 440px;
      padding: 0.55rem 0.75rem;
      margin-top: 0.3rem;
      font-family: inherit;
      font-size: 0.95rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: #fafcfb;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: rgba(105, 9, 11, 0.45);
      box-shadow: 0 0 0 3px var(--accent-soft);
      background: #fff;
    }

    .row-actions { display: flex; gap: 0.45rem; align-items: center; flex-wrap: wrap; }

    /* Админка: сетка ссылок и статистика */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.75rem;
      margin: 1rem 0 0.25rem;
    }
    .stat {
      background: linear-gradient(160deg, rgba(105, 9, 11, 0.07) 0%, rgba(255, 255, 255, 0.9) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.9rem 1rem;
      text-align: center;
    }
    .stat .stat-value {
      font-size: 1.65rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--accent);
      line-height: 1.2;
    }
    .stat .stat-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-top: 0.35rem;
    }
    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 0.65rem;
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .link-grid li { margin: 0; }
    .link-grid a {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      padding: 0.95rem 1.1rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.65);
      color: var(--text);
      font-weight: 600;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .link-grid a:hover {
      border-color: rgba(105, 9, 11, 0.35);
      background: #fff;
      box-shadow: var(--shadow-sm);
      color: var(--accent);
    }
    .link-grid a span.desc {
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--muted);
    }

    .login-page {
      min-height: calc(100vh - 120px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 2rem 1.75rem;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .login-card .login-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(145deg, var(--accent) 0%, #560708 100%);
      color: #fff;
      font-size: 1.35rem;
      margin-bottom: 1rem;
      box-shadow: 0 6px 20px rgba(105, 9, 11, 0.35);
    }
    .login-card h1 { margin-bottom: 0.35rem; }
    .login-card .muted { margin-bottom: 1.25rem; }

    /* Списки на публичных страницах */
    .public-links {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .public-links a {
      display: block;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.6);
      font-weight: 600;
      color: var(--text);
    }
    .public-links a:hover {
      border-color: rgba(105, 9, 11, 0.35);
      background: #fff;
      color: var(--accent);
    }

    .dashboard-quick {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem 0.65rem;
      align-items: center;
      line-height: 1.45;
    }
    @media (max-width: 480px) {
      .dashboard-quick {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    /* ---------- Адаптив ---------- */
    table { min-width: 0; }
    tbody td, thead th {
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    @media (max-width: 640px) {
      body { font-size: 15px; }
      .main-content {
        padding-left: max(0.875rem, env(safe-area-inset-left, 0px));
        padding-right: max(0.875rem, env(safe-area-inset-right, 0px));
        padding-top: 1.25rem;
        padding-bottom: max(2.5rem, env(safe-area-inset-bottom, 0px));
      }
      .site-header {
        padding-left: max(0.875rem, env(safe-area-inset-left, 0px));
        padding-right: max(0.875rem, env(safe-area-inset-right, 0px));
        padding-top: max(0.75rem, env(safe-area-inset-top, 0px));
        padding-bottom: 0.75rem;
      }
      .card {
        padding: 1.1rem 1rem;
        border-radius: 12px;
      }
      .card h1 { font-size: 1.28rem; }
      .stat .stat-value { font-size: 1.45rem; }
      .link-grid {
        grid-template-columns: 1fr;
        gap: 0.5rem;
      }
      .link-grid a {
        padding: 0.85rem 1rem;
        min-height: 3rem;
      }
      .toolbar {
        gap: 0.65rem;
        align-items: stretch;
      }
      .toolbar > h1 {
        flex: 1 1 100%;
        min-width: 0;
      }
      .toolbar > a.btn,
      .toolbar > .btn {
        min-height: 44px;
        padding-left: 1rem;
        padding-right: 1rem;
      }
      .toolbar .btn-sm { min-height: 44px; }
      .btn { min-height: 44px; }
      .btn-sm { min-height: 40px; padding: 0.45rem 0.85rem; }
      thead th {
        padding: 0.55rem 0.5rem;
        font-size: 0.68rem;
      }
      tbody td { padding: 0.55rem 0.5rem; font-size: 0.88rem; }
      .table-wrap { margin: 0 -0.5rem; padding: 0 0.5rem; }
      .table-wrap > table {
        min-width: max(100%, 30rem);
      }
      .site-nav {
        width: 100%;
        justify-content: flex-start;
      }
      .site-nav a {
        display: inline-flex;
        align-items: center;
        min-height: 44px;
        padding: 0.5rem 1rem;
      }
      .login-page {
        min-height: calc(100dvh - 100px);
        align-items: flex-start;
        padding-top: 1.5rem;
      }
      .login-card { padding: 1.5rem 1.15rem; }
      input, select, textarea {
        max-width: none;
      }
    }

    @media (max-width: 380px) {
      .stat-grid {
        grid-template-columns: 1fr 1fr;
        gap: 0.5rem;
      }
      .stat { padding: 0.65rem 0.5rem; }
      .stat .stat-label { font-size: 0.65rem; letter-spacing: 0.03em; }
    }

    @media (max-width: 300px) {
      .stat-grid { grid-template-columns: 1fr; }
    }

    /* Узкие экраны: действия в таблице столбиком */
    @media (max-width: 640px) {
      td.row-actions {
        vertical-align: top;
      }
      .row-actions {
        flex-direction: column;
        align-items: stretch !important;
        gap: 0.5rem;
      }
      .row-actions form {
        display: flex;
        flex-direction: column;
        align-items: stretch;
        gap: 0.35rem;
        width: 100%;
      }
      .row-actions input[type="text"],
      .row-actions input[type="number"] {
        max-width: none;
        width: 100%;
      }
      .row-actions .btn { width: 100%; }
    }

    @media (prefers-reduced-motion: reduce) {
      .btn, .link-grid a, .public-links a, a {
        transition: none;
      }
      .btn:hover { transform: none; }
    }

    :focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .btn:focus-visible {
      outline-offset: 3px;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <header class="site-header">
    <div class="brand"><a href="/">ФЭБник</a></div>
    <nav class="site-nav">
      <a href="/schedule">Расписание</a>
      <a href="/prizes-view">Призы</a>
    </nav>
  </header>
  <main class="main-content">
    {% if flash %}
    <div class="flash">{{ flash }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
