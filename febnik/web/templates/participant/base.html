<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>{% block title %}ФЭБник{% endblock %}</title>
  <link rel="icon" href="/favicon.ico" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Source+Sans+3:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      /* Палитра из Figma (node 8083:69 «цвета») — бордо, графит, сланец, без зелёного */
      --feb-graphite: #282828;
      --feb-bordeaux: #69090b;
      --feb-bordeaux-hover: #560708;
      --feb-slate: #607190;
      --feb-page-bg: #fef0db;
      --feb-surface-warm: #f8f5f2;
      --feb-cream: #fafbd3;
      --feb-gold: #c49a4a;
      --feb-text: #282828;
      --feb-muted: #5c6478;
      --feb-card: #ffffff;
      --feb-border: rgba(40, 40, 40, 0.1);
      --feb-radius: 16px;
      --feb-shadow: 0 8px 32px rgba(40, 40, 40, 0.07);
      --font-display: "Montserrat", system-ui, sans-serif;
      --font-body: "Source Sans 3", system-ui, sans-serif;
      --feb-accent: #d787a4;
      --feb-accent-ink: #fafbd3;
      --font-accent: "Cormorant Garamond", Georgia, "Times New Roman", serif;
    }
    @font-face {
      font-family: "Cormorant Garamond";
      src: url("/static/fonts/CormorantGaramond-Regular.ttf") format("truetype");
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    * { box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--font-body);
      font-size: 17px;
      line-height: 1.5;
      color: var(--feb-text);
      /* Текстура «шёлк» + лёгкие градиенты поверх (альфа небольшая — иначе шёлк не виден) */
      background:
        radial-gradient(120% 80% at 100% 0%, rgba(105, 9, 11, 0.07) 0%, transparent 55%) fixed,
        radial-gradient(90% 60% at 0% 100%, rgba(96, 113, 144, 0.1) 0%, transparent 50%) fixed,
        linear-gradient(180deg, rgba(254, 240, 219, 0.4) 0%, rgba(254, 240, 219, 0.35) 100%) fixed,
        url("/static/brand/sholk-bg.svg") center center / cover no-repeat fixed;
      background-color: var(--feb-page-bg);
    }
    a { color: var(--feb-bordeaux); font-weight: 600; text-decoration: none; }
    a:hover { color: var(--feb-bordeaux-hover); text-decoration: underline; }

    .feb-main {
      max-width: 520px;
      margin: 0 auto;
      padding: 1.5rem max(1rem, env(safe-area-inset-left)) 3rem;
      padding-right: max(1rem, env(safe-area-inset-right));
    }

    .feb-card {
      background: var(--feb-card);
      border-radius: var(--feb-radius);
      border: 1px solid var(--feb-border);
      box-shadow: var(--feb-shadow);
      padding: 1.75rem 1.5rem;
    }
    .feb-card h1 {
      font-family: var(--font-display);
      font-size: 1.45rem;
      font-weight: 700;
      margin: 0 0 0.5rem 0;
      color: var(--feb-text);
      letter-spacing: -0.02em;
    }
    .feb-muted { color: var(--feb-muted); font-size: 0.95rem; }

    .feb-flash {
      padding: 0.75rem 1rem;
      border-radius: 12px;
      background: rgba(105, 9, 11, 0.08);
      border: 1px solid rgba(105, 9, 11, 0.18);
      color: var(--feb-text);
      margin-bottom: 1rem;
      font-weight: 500;
    }

    button.feb-btn {
      appearance: none;
      font: inherit;
    }
    .feb-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.68rem 1.25rem;
      border: none;
      border-radius: 12px;
      font-family: var(--font-body);
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.25;
      cursor: pointer;
      background: linear-gradient(180deg, #8a1e22 0%, #69090b 48%, #560708 100%);
      color: #fff;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.12) inset,
        0 4px 14px rgba(105, 9, 11, 0.35);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      transition: filter 0.15s ease, transform 0.1s ease, box-shadow 0.15s ease;
    }
    .feb-btn:hover { filter: brightness(1.06); text-decoration: none; }
    .feb-btn:active {
      filter: brightness(0.97);
      transform: translateY(1px);
    }
    a.feb-btn {
      text-decoration: none;
      box-sizing: border-box;
    }
    a.feb-btn:hover { text-decoration: none; }
    .feb-btn:focus-visible {
      outline: 2px solid rgba(105, 9, 11, 0.55);
      outline-offset: 3px;
    }
    .feb-btn-accent {
      background: linear-gradient(180deg, #df95ae 0%, #d787a4 45%, #c97392 100%);
      color: var(--feb-accent-ink);
      font-family: var(--font-accent);
      font-size: 1.32rem;
      font-weight: 400;
      line-height: 1.22;
      letter-spacing: 0.045em;
      padding: 0.85rem 1.45rem;
      min-height: 3.15rem;
      border-radius: 14px;
      text-shadow: 0 1px 1px rgba(60, 20, 35, 0.12);
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.28) inset,
        0 -1px 0 rgba(90, 30, 50, 0.08) inset,
        0 6px 22px rgba(215, 135, 164, 0.48);
    }
    .feb-btn-accent:hover {
      filter: brightness(1.05);
      text-decoration: none;
    }
    .feb-btn-accent:active {
      filter: brightness(0.96);
      transform: translateY(1px);
    }
    .feb-btn-accent:focus-visible {
      outline: 2px solid var(--feb-accent-ink);
      outline-offset: 3px;
      box-shadow:
        0 1px 0 rgba(255, 255, 255, 0.28) inset,
        0 6px 22px rgba(215, 135, 164, 0.48),
        0 0 0 4px rgba(215, 135, 164, 0.35);
    }
    .feb-btn-secondary {
      background: var(--feb-graphite);
      box-shadow: 0 2px 12px rgba(40, 40, 40, 0.25);
    }
    .feb-btn-ghost {
      background: rgba(255, 255, 255, 0.12);
      color: var(--feb-text);
      border: 1.5px solid rgba(40, 40, 40, 0.18);
      font-family: var(--font-accent);
      font-size: 1.18rem;
      font-weight: 400;
      line-height: 1.25;
      letter-spacing: 0.035em;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.35) inset;
      min-height: 3rem;
      border-radius: 14px;
    }
    .feb-btn-ghost:hover {
      background: rgba(255, 255, 255, 0.28);
      border-color: rgba(40, 40, 40, 0.22);
      color: var(--feb-text);
    }
    .feb-btn-ghost.feb-btn-sm {
      font-family: var(--font-body);
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 0.01em;
      padding: 0.45rem 0.95rem;
      min-height: auto;
      line-height: 1.3;
      border-radius: 999px;
      color: var(--feb-bordeaux);
      border: 1.5px solid rgba(105, 9, 11, 0.32);
      background: rgba(255, 255, 255, 0.35);
      box-shadow: none;
    }
    .feb-btn-ghost.feb-btn-sm:hover {
      background: rgba(255, 255, 255, 0.55);
      border-color: rgba(105, 9, 11, 0.42);
      color: var(--feb-bordeaux);
    }
    .feb-btn-ghost:focus-visible {
      outline: 2px solid rgba(40, 40, 40, 0.28);
      outline-offset: 3px;
    }
    .feb-btn-ghost.feb-btn-sm:focus-visible {
      outline-color: rgba(105, 9, 11, 0.45);
    }

    label { display: block; margin-top: 1rem; font-weight: 600; color: var(--feb-muted); font-size: 0.9rem; }
    textarea {
      resize: vertical;
      min-height: 4.5rem;
    }
    input, select, textarea {
      width: 100%;
      margin-top: 0.35rem;
      padding: 0.65rem 0.85rem;
      border-radius: 12px;
      border: 1px solid var(--feb-border);
      font-family: inherit;
      font-size: 1rem;
      background: #fafcfb;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--feb-bordeaux);
      box-shadow: 0 0 0 3px rgba(105, 9, 11, 0.12);
      background: #fff;
    }

    .feb-balance {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      color: var(--feb-bordeaux);
      letter-spacing: -0.03em;
    }
    .feb-links { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1.25rem; }
    .feb-links a.feb-tile {
      display: block;
      padding: 1rem 1.1rem;
      border-radius: 14px;
      border: 1px solid var(--feb-border);
      background: rgba(255, 255, 255, 0.7);
      color: var(--feb-text);
      text-decoration: none;
      font-weight: 600;
    }
    .feb-links a.feb-tile:hover { border-color: rgba(105, 9, 11, 0.28); background: #fff; }
    .feb-links a.feb-tile span { display: block; font-size: 0.85rem; font-weight: 400; color: var(--feb-muted); margin-top: 0.2rem; }

    .feb-cabinet-hero {
      text-align: center;
      margin-bottom: 1.25rem;
    }
    .feb-cabinet-hero .feb-balance {
      justify-content: center;
    }
    .feb-cabinet-actions {
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
      margin: 1.25rem 0 1rem;
    }
    .feb-cabinet-actions .feb-btn {
      width: 100%;
      justify-content: center;
    }
    .feb-cabinet-secondary {
      margin-top: 0.25rem;
    }
    .feb-page-tools {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .feb-page-tools h1 {
      margin: 0;
      flex: 1;
      min-width: 0;
    }
    .feb-table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 0.75rem 0 0;
      border-radius: 12px;
      border: 1px solid var(--feb-border);
      background: rgba(255, 255, 255, 0.65);
    }
    .feb-table-wrap table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }
    .feb-table-wrap th,
    .feb-table-wrap td {
      padding: 0.65rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--feb-border);
      vertical-align: top;
    }
    .feb-table-wrap th {
      font-family: var(--font-display);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--feb-muted);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .feb-table-wrap tr:last-child td { border-bottom: none; }

    .feb-prize-list {
      list-style: none;
      padding: 0;
      margin: 1rem 0 0;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .feb-prize-item {
      padding: 1rem 1.05rem;
      border-radius: 14px;
      border: 1px solid var(--feb-border);
      background: rgba(255, 255, 255, 0.85);
    }
    .feb-prize-item__head {
      margin-bottom: 0.75rem;
    }
    .feb-prize-item__head strong {
      display: block;
      margin-bottom: 0.25rem;
    }
    .feb-prize-item__head .feb-muted {
      font-size: 0.9rem;
    }
    .feb-prize-insufficient {
      margin: 0;
      padding: 0.65rem 0.75rem;
      border-radius: 12px;
      font-size: 0.95rem;
      color: var(--feb-muted);
      background: rgba(40, 40, 40, 0.06);
      border: 1px dashed rgba(40, 40, 40, 0.18);
    }

    .feb-qr-wrap { text-align: center; margin-top: 1rem; }
    .feb-qr-wrap img { max-width: min(280px, 100%); height: auto; border-radius: 12px; border: 1px solid var(--feb-border); }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <main class="feb-main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
