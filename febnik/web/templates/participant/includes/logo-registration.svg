<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 78" fill="none" role="img" aria-labelledby="feb-logo-title">
  <title id="feb-logo-title">&#1041;&#1041; &#1060;&#1069;&#1041;&#1085;&#1080;&#1082;</title>
  <defs>
