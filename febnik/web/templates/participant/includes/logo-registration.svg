  <text x="84" y="56" fill="#0c3229" font-family="Montserrat, system-ui, sans-serif" font-size="31" font-weight="700" letter-spacing="-0.035em">&#1060;&#1069;&#1041;&#1085;&#1080;&#1082;</text>
