      <stop stop-color="#237a52"/>
      <stop offset="0.5" stop-color="#1a6b4a"/>
      <stop offset="1" stop-color="#082018"/>
    </linearGradient>
    <linearGradient id="febLgGoldLine" x1="84" y1="0" x2="340" y2="0" gradientUnits="userSpaceOnUse">
