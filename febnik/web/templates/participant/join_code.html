{% extends "participant/join_layout.html" %}
{% block join_title %}Код из письма — ФЭБник{% endblock %}
{% block join_inner %}
  <p class="feb-muted" style="text-align:center;margin:0 0 1rem;">Код отправлен на<br><strong>{{ pending_email }}</strong></p>
  <form method="post" action="/join/code">
    <label class="feb-join-name-label" for="otp">Код из письма</label>
    <input id="otp" class="feb-join-otp" type="text" name="otp" required maxlength="8" pattern="[0-9 ]*" inputmode="numeric" autocomplete="one-time-code" placeholder="000000" autofocus>
    <p style="margin-top:1.5rem;">
      <button type="submit" class="feb-btn feb-btn-accent" style="width:100%;">Войти</button>
    </p>
  </form>
  <div class="feb-join-resend">
    <form method="post" action="/join/resend">
      <button type="submit">Отправить код снова</button>
    </form>
  </div>
  <p style="margin-top:1rem;text-align:center;"><a href="/join">Другой адрес почты</a></p>
  {% if not smtp_configured %}
  <p class="feb-muted" style="text-align:center;margin:1rem 0 0;font-size:0.88rem;">Без SMTP код смотрите в консоли/логах приложения.</p>
  {% endif %}
{% endblock %}
