{% extends "participant/join_layout.html" %}
{% block join_title %}Ваше имя — ФЭБник{% endblock %}
{% block join_inner %}
  <p class="feb-muted" style="text-align:center;margin:0 0 1rem;">Почта подтверждена: <strong>{{ verified_email }}</strong></p>
  <form method="post" action="/join/name">
    <label class="feb-join-name-label" for="fn">Фамилия и имя</label>
    <input id="fn" class="feb-join-name-input" type="text" name="full_name" required maxlength="512" autocomplete="name" placeholder="Иванов Иван">
    <p style="margin-top:1.5rem;">
      <button type="submit" class="feb-btn feb-btn-accent" style="width:100%;">Создать кабинет</button>
    </p>
  </form>
{% endblock %}
